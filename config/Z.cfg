[stepper_z]
# connected to Motor 5
step_pin: PB5
dir_pin: PB4
enable_pin: !PB6
full_steps_per_rotation: 200
rotation_distance: 40
microsteps: 32
gear_ratio: 5:1
endstop_pin: probe:z_virtual_endstop
position_max: 170
position_min: -2
homing_speed: 25
homing_retract_dist: 0

[stepper_z1]
# connected to MOTOR 6
step_pin: PG15
dir_pin: !PB3
enable_pin: !PD5
full_steps_per_rotation: 200
microsteps: 32
rotation_distance: 40
gear_ratio: 5:1

[stepper_z2]
# connected to Motor 7
step_pin: PD3
dir_pin: !PD2
enable_pin: !PD4
full_steps_per_rotation: 200
microsteps: 32
rotation_distance: 40
gear_ratio: 5:1

# TMC Stepper Driver Settings


[tmc2209 stepper_z]
uart_pin: PG10
sense_resistor: 0.110
stealthchop_threshold: ${constants.stealthchop_z}
interpolate: ${constants.interpolate_z}
run_current: ${constants.run_current_z}
driver_TBL: ${constants.driver_tbl_z}
driver_TOFF: ${constants.driver_toff_z}
driver_HSTRT: ${constants.driver_hsrt_z}
driver_HEND: ${constants.driver_hend_z}

[tmc2209 stepper_z1]
uart_pin: PG9
sense_resistor: 0.110
stealthchop_threshold: ${constants.stealthchop_z}
interpolate: ${constants.interpolate_z}
run_current: ${constants.run_current_z}
driver_TBL: ${constants.driver_tbl_z}
driver_TOFF: ${constants.driver_toff_z}
driver_HSTRT: ${constants.driver_hsrt_z}
driver_HEND: ${constants.driver_hend_z}

[tmc2209 stepper_z2]
uart_pin: PD7
sense_resistor: 0.110
stealthchop_threshold: ${constants.stealthchop_z}
interpolate: ${constants.interpolate_z}
run_current: ${constants.run_current_z}
driver_TBL: ${constants.driver_tbl_z}
driver_TOFF: ${constants.driver_toff_z}
driver_HSTRT: ${constants.driver_hsrt_z}
driver_HEND: ${constants.driver_hend_z}